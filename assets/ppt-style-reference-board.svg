<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="0.55" stop-color="#172a31"/>
      <stop offset="1" stop-color="#07090c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d09b"/>
      <stop offset="0.48" stop-color="#f7f2df"/>
      <stop offset="1" stop-color="#26381f"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .bg{fill:#0b0b0a}
      .card{fill:#0e0f0d;stroke:#2a2b27;stroke-width:2}
      .line{stroke:#d8d6cc;stroke-width:1.5;opacity:.58}
      .micro{font:500 16px Inter,Arial,sans-serif;fill:#d8d6cc;letter-spacing:.5px}
      .tiny{font:400 12px Inter,Arial,sans-serif;fill:#c8c6bc;opacity:.76}
      .title{font:800 66px Inter,Arial,sans-serif;fill:#f3f1e8;letter-spacing:-1px}
      .serif{font:400 70px Georgia,'Times New Roman',serif;fill:#f4f0df;letter-spacing:-1px}
      .caption{font:700 22px Inter,Arial,sans-serif;fill:#f1efe4}
      .label{font:500 15px Inter,Arial,sans-serif;fill:#a8a59a}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <rect width="1600" height="980" filter="url(#grain)" opacity=".55"/>
  <text x="70" y="72" class="micro">LINGJING PRESENTATION STYLE BOARD</text>
  <text x="70" y="122" class="label">black editorial / cinematic landscape / oversized title / fine information grid / restrained warm light</text>

  <g transform="translate(70 170)" filter="url(#softShadow)">
