    <line x1="421" y1="134" x2="468" y2="168" stroke="#ffffff" stroke-width="4" opacity=".72"/>
    <text x="44" y="226" font-family="Inter,Arial,sans-serif" font-size="126" font-weight="500" fill="#f5f5ec" letter-spacing="-4">Neutrals</text>
